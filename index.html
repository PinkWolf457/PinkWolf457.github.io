  <header class="custom-header">

  <body>
    <div class="container">
      <section class="loading-cube">
        <div class="cube cube3d">
          <div class="front"></div>
          <div class="back"></div>
          <div class="top"></div>
          <div class="bottom"></div>
          <div class="left"></div>
          <div class="right"></div>

      <script>
        const cube = document.querySelector("div.cube.cube3d");
        setTimeout(() => {
          cube.classList.add("lotation");
